# Déploiement Netlify — frontend React (PWA)
[build]
  # Force l'installation des devDependencies (vite, plugins) puis build direct (sans tsc, identique en sortie)
  command = "npm install --include=dev && npx vite build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--include=dev"
  # L'URL de l'API est déjà figée dans .env.production (pas besoin de configurer ici)

# Désactive le post-traitement Netlify (sert nos fichiers buildés tels quels)
[build.processing]
  skip_processing = true

# SPA : toutes les routes renvoient vers index.html (React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
